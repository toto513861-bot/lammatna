<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لمّتنا</title>

<style>
body{
font-family:Arial,sans-serif;
background:#6a5acd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:white;
color:#333;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

input{
width:90%;
padding:12px;
margin:15px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#6a5acd;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5848c2;
}
</style>
</head>

<body>

<div class="box">
<h1>💜 لمّتنا</h1>
<p>اكتبي اسمك المستعار</p>

<input type="text" placeholder="اسمك">

<br>

<button>دخول</button>

</div>

</body>
</html>
