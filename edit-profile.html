<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تعديل الملف - لمتنا</title>

<style>

body{
margin:0;
font-family:Arial;
background:#6a5acd;
text-align:center;
}

.top{
background:#5b4ac9;
color:white;
padding:15px;
font-size:25px;
font-weight:bold;
}

.box{
background:white;
width:90%;
max-width:420px;
margin:35px auto;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

input,select{
width:100%;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:17px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
background:#6a5acd;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="top">✏️ تعديل الملف</div>

<div class="box">

<input id="username" placeholder="اسم المستخدم">

<input id="age" type="number" placeholder="العمر">

<select id="gender">
<option>ذكر</option>
<option>أنثى</option>
<option>آخر</option>
</select>

<button onclick="saveProfile()">💾 حفظ التعديلات</button>

<button onclick="location.href='profile.html'">↩️ رجوع</button>

</div>

<script>

document.getElementById("username").value =
localStorage.getItem("username") || "";

document.getElementById("age").value =
localStorage.getItem("age") || "";

document.getElementById("gender").value =
localStorage.getItem("gender") || "";

function saveProfile(){

localStorage.setItem(
"username",
document.getElementById("username").value
);

localStorage.setItem(
"age",
document.getElementById("age").value
);

localStorage.setItem(
"gender",
document.getElementById("gender").value
);

alert("تم حفظ التعديلات 💜");

location.href="profile.html";

}

</script>

</body>
</html>
