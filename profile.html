<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ملفي - لمتنا</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#6a5acd;
    text-align:center;
}

.top{
    background:#5b4ac9;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.box{
    background:white;
    width:90%;
    max-width:400px;
    margin:40px auto;
    padding:20px;
    border-radius:20px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#ddd;
    margin:15px auto;
    font-size:50px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.info{
    text-align:right;
    margin-top:20px;
    line-height:2;
}

button{
    width:90%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#6a5acd;
    color:white;
    font-size:18px;
}
</style>

</head>

<body>

<div class="top">
<div>⚙️</div>
<div><b>💜 ملفي</b></div>
</div>

<div class="box">

<div class="avatar">👤</div>

<h2>الاسم</h2>

<div class="info">
<p>🎂 العمر: --</p>
<p>⚧️ الجنس: --</p>
<p>👑 الرتبة: عضو</p>
</div>

<button>تعديل الملف الشخصي</button>

</div>

</body>
</html>
