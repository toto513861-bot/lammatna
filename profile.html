<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ملفي - لمتنا</title>

<style>

body{
margin:0;
font-family:Arial;
background:#6a5acd;
text-align:center;
}

.top{
background:#5b4ac9;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.settings{
font-size:25px;
cursor:pointer;
}

.logo{
font-size:25px;
font-weight:bold;
}

.box{
background:white;
width:90%;
max-width:420px;
margin:35px auto;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
background:#eeeeee;
margin:0 auto 20px;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
}

.userInfo{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.rank{
color:#8a2be2;
}

.username{
color:black;
}

.info{
font-size:18px;
margin:12px 0;
color:#333;
text-align:right;
}

hr{
border:none;
border-top:1px solid #ddd;
margin:20px 0;
}

button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
background:#6a5acd;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="top">
<div class="settings">⚙️</div>
<div class="logo">💜 لمتنا</div>
</div>

<div class="box">

<div class="avatar">👤</div>

<div class="userInfo">
<span class="rank">💎 عضو مميز</span>
<span class="username" id="username">اسم المستخدم</span>
</div>

<hr>

<p class="info" id="age">🎂 العمر: --</p>

<p class="info" id="gender">⚧️ الجنس: --</p>

<p class="info" id="joinDate">📅 انضم في: --</p>

<hr>

<button>✏️ تعديل الملف</button>

<button>⚙️ الإعدادات</button>

</div>

<script>

document.getElementById("username").textContent =
localStorage.getItem("username") || "اسم المستخدم";

document.getElementById("age").textContent =
"🎂 العمر: " + (localStorage.getItem("age") || "--");

document.getElementById("gender").textContent =
"⚧️ الجنس: " + (localStorage.getItem("gender") || "--");

document.getElementById("joinDate").textContent =
"📅 انضم في: " + (localStorage.getItem("joinDate") || "--");

</script>

</body>
</html>
