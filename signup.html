<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب - لمتنا</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#6a5acd;
    text-align:center;
}

.box{
    background:white;
    width:90%;
    max-width:400px;
    margin:60px auto;
    padding:25px;
    border-radius:20px;
}

input, select{
    width:90%;
    padding:12px;
    margin:15px 0;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:95%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#6a5acd;
    color:white;
    font-size:18px;
}

.step{
    display:none;
}

.step.active{
    display:block;
}
</style>

</head>

<body>

<div class="box">

<h2>إنشاء حساب في لمتنا 💜</h2>

<div class="step active">
<h3>ما اسمك؟ 👤</h3>
<input placeholder="اكتب اسمك">
<button onclick="nextStep()">التالي ➡️</button>
</div>


<div class="step">
<h3>كم عمرك؟ 🎂</h3>
<input type="number" placeholder="العمر">
<button onclick="nextStep()">التالي ➡️</button>
</div>


<div class="step">
<h3>اختر الجنس ⚧️</h3>

<select>
<option>اختر</option>
<option>ذكر</option>
<option>أنثى</option>
<option>آخر</option>
</select>

<button onclick="nextStep()">التالي ➡️</button>
</div>


<div class="step">
<h3>🎉 تم تجهيز حسابك</h3>
<p>أهلاً بك في لمتنا 💜</p>
<button onclick="location.href='home.html'">الدخول إلى لمتنا</button>
</div>


</div>


<script>

let current = 0;
let steps = document.querySelectorAll(".step");

function nextStep(){

steps[current].classList.remove("active");

current++;

steps[current].classList.add("active");

}

</script>

</body>
</html>
