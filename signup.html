<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب - لمتنا</title>

<style>

body{
margin:0;
font-family:Arial;
background:#6a5acd;
text-align:center;
}

.box{
background:white;
width:90%;
max-width:420px;
margin:50px auto;
padding:25px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

h2{
color:#6a5acd;
}

input,select{
width:100%;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #ccc;
font-size:17px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#6a5acd;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>إنشاء حساب 💜</h2>

<input id="name" type="text" placeholder="👤 الاسم">

<input id="username" type="text" placeholder="🏷️ اسم المستخدم">

<input id="age" type="number" placeholder="🎂 العمر">

<select id="gender">
<option value="">⚧️ اختر الجنس</option>
<option>ذكر</option>
<option>أنثى</option>
<option>آخر</option>
</select>

<input id="password" type="password" placeholder="🔒 كلمة المرور">

<input id="confirmPassword" type="password" placeholder="🔐 تأكيد كلمة المرور">

<button id="createAccount">إنشاء الحساب 💜</button>

</div>

<script>

document.getElementById("createAccount").onclick = function(){

const name = document.getElementById("name").value;
const username = document.getElementById("username").value;
const age = document.getElementById("age").value;
const gender = document.getElementById("gender").value;
const password = document.getElementById("password").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(name=="" || username=="" || age=="" || gender=="" || password=="" || confirmPassword==""){
alert("أكملي جميع البيانات 💜");
return;
}

if(password !== confirmPassword){
alert("كلمتا المرور غير متطابقتين 🤧");
return;
}

localStorage.setItem("name", name);
localStorage.setItem("username", username);
localStorage.setItem("age", age);
localStorage.setItem("gender", gender);

const today = new Date();
const joinDate = today.getDate() + " / " + (today.getMonth()+1) + " / " + today.getFullYear();
localStorage.setItem("joinDate", joinDate);

location.href = "home.html";

};

</script>

</body>

</html>
