<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدردشة - لمتنا</title>

<style>
body{
margin:0;
font-family:Arial;
background:#6a5acd;
}

.top{
background:#5b4ac9;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
}

.chat{
background:white;
width:90%;
max-width:450px;
margin:20px auto;
padding:20px;
border-radius:20px;
height:420px;
overflow:auto;
}

.message{
margin-bottom:20px;
text-align:right;
}

.name{
font-weight:bold;
margin-bottom:5px;
}

.text{
background:#f2f2f2;
padding:12px;
border-radius:12px;
display:inline-block;
max-width:80%;
}

.send{
width:90%;
max-width:450px;
margin:20px auto;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#5b4ac9;
color:white;
}
  .menu{
display:none;
background:white;
width:90%;
max-width:450px;
margin:10px auto;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.menu button{
width:100%;
margin:6px 0;
background:#eeeeee;
color:black;
} 
</style>
</head>

<body>

<div class="top">
<div>⚙️</div>
<button onclick="location.href='chat.html'">💬 الدردشة</button>
</div>

<div class="chat">

<div class="message">
<div class="name">👑 <bdi>✦ كـارهـ𝓗𝓪𝓽𝓮𝓻𝓼ــتـهـم ✦</bdi></div>
<div class="text">
أهلًا وسهلًا بكم في 💜 لمتنا.<br><br>
يسعدني وجودكم هنا، وإن شاء الله يكون هذا المكان مليان احترام، وصداقات جميلة، ولحظات حلوة للجميع 🌷
</div>
</div>

</div>

  <div class="send">

<button id="emoji">😊</button>

<input id="messageInput" placeholder="اكتب رسالتك...">

<button id="plus">➕</button>

<button onclick="sendMessage()">📤</button>

</div>

<div id="menu" class="menu">

<button>🖼️ صورة</button>

<button>📷 كاميرا</button>

<button>🎵 موسيقى</button>

<button>📹 يوتيوب</button>

<button>🎮 ألعاب</button>

<button>🎨 رسم</button>

<button>📸 تصوير</button>

</div>


  <script>

function sendMessage(){

let input=document.getElementById("messageInput");

if(input.value.trim()==""){
return;
}

let chat=document.querySelector(".chat");

chat.innerHTML += `
<div class="message">
<div class="name">👑 ✦ كـارهـ𝓗𝓪𝓽𝓮𝓻𝓼ــتـهـم ✦</div>
<div class="text">${input.value}</div>
</div>
`;

input.value="";

chat.scrollTop=chat.scrollHeight;

}

const plus = document.getElementById("plus");
const menu = document.getElementById("menu");

plus.onclick = function () {
    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
};

document.addEventListener("click", function (e) {
    if (!menu.contains(e.target) && e.target !== plus) {
        menu.style.display = "none";
    }
});

</script>

</body>
</html>
